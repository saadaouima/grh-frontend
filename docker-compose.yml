version: "3.9"

services:
  # -----------------------------------
  # POSTGRES POUR KEYCLOAK
  # -----------------------------------
  postgres-kc:
    image: postgres:16-alpine
    container_name: postgres-kc
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # -----------------------------------
  # KEYCLOAK 26.5.5
  # -----------------------------------
  keycloak:
    build:
      context: .
      dockerfile: Dockerfile.keycloak
    container_name: keycloak

    # 👇 IMPORT AUTOMATIQUE DU REALM
    command: start-dev --import-realm

    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin

      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-kc:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password

      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"

      KC_THEME_CACHE_THEMES: "false"
      KC_THEME_CACHE_TEMPLATES: "false"

    ports:
      - "8080:8080"

    # 👇 Monte automatiquement ton export
    volumes:
      - ./realm-export.json:/opt/keycloak/data/import/realm.json:ro

    depends_on:
      - postgres-kc

volumes:
  postgres_data:
